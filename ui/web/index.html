<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knight Energy - Protocol Configuration</title>
    
    <!-- Load fonts and icons from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
    
    <!-- Eel runtime script -->
    <script type="text/javascript" src="/eel.js"></script>
    
    <!-- Global CSS Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="mainframe-body">
    <!-- Matrix Rain Background -->
    <canvas id="matrix-canvas"></canvas>

    <!-- Visual overlay: CRT Scanline -->
    <div class="scanline"></div>

    <!-- Application Header -->
    <header class="app-header">
        <div class="header-logo" id="header-logo-btn">
            <span class="material-symbols-outlined text-primary glow-text">bolt</span>
            <span class="header-title uppercase font-bold tracking-wide">KNIGHT ENERGY</span>
        </div>
        <div class="header-actions">
            <button class="header-btn" id="terminal-view-btn" title="Consola de depuración">
                <span class="material-symbols-outlined">terminal</span>
            </button>
            <button class="header-btn" id="settings-view-btn" title="Configuración">
                <span class="material-symbols-outlined">settings</span>
            </button>
        </div>
    </header>

    <!-- Main Dynamic Application Container -->
    <main id="app-container" class="app-main">
        <!-- Views will be injected dynamically here by router.js -->
    </main>

    <!-- Keyboard Shortcuts & Terminal Footer -->
    <footer class="app-footer">
        <div class="shortcut-list">
            <div class="shortcut-item">
                <span class="shortcut-key">↑↓</span> NAVEGAR
            </div>
            <div class="shortcut-item">
                <span class="shortcut-key">←→</span> CAMBIAR VALOR
            </div>
            <div class="shortcut-item">
                <span class="shortcut-key">ENTER</span> SELECCIONAR
            </div>
            <div class="shortcut-item">
                <span class="shortcut-key">ESC</span> SALIR
            </div>
            <div class="shortcut-prompt">
                <span class="prompt-arrow text-primary">&gt;</span>
                <span class="cursor-blink">_</span>
            </div>
        </div>
    </footer>

    <!-- Main Javascript Entrypoint -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
