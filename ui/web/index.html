<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knight Energy - Protocol Configuration</title>
    
    <!-- Load fonts and icons from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
    
    <!-- Eel runtime script -->
    <script type="text/javascript" src="/eel.js"></script>
    
    <!-- Global CSS Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="mainframe-body">
    <!-- Matrix Rain Background -->
    <canvas id="matrix-canvas"></canvas>

    <!-- Visual overlay: CRT Scanline -->
    <div class="scanline"></div>

    <!-- Application Header -->
    <header class="app-header">
        <div class="header-logo" id="header-logo-btn">
            <span class="material-symbols-outlined text-primary glow-text">bolt</span>
            <span class="header-title uppercase font-bold tracking-wide">KNIGHT ENERGY</span>
        </div>
        <div class="header-actions">
            <button class="header-btn" id="settings-view-btn" title="Configuración">
                <span class="material-symbols-outlined">settings</span>
            </button>
            <div class="settings-dropdown" id="settings-dropdown">
                <div class="dropdown-header">
                    <span class="material-symbols-outlined">volume_up</span>
                    <span>SONIDO :</span>
                </div>
                <div class="volume-control">
                    <div class="volume-slider-row">
                        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
                        <span class="volume-percentage" id="volume-pct">50%</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Dynamic Application Container -->
    <main id="app-container" class="app-main">
        <!-- Views will be injected dynamically here by router.js -->
    </main>



    <!-- Main Javascript Entrypoint -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
